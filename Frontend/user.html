<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профіль — Слово</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500;600;700&family=Cormorant+Infant:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/Frame 10.png">
  <link rel="stylesheet" href="../css/user.css">
</head>
<body>

  <button class="btn-back" id="backButton" title="Повернутися">
    <i class="fas fa-arrow-left"></i>
  </button>

  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="uk">УК</button>
    <div class="lang-divider"></div>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <div class="profile-wrap">

    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-name" id="profileName"></div>
      <div class="profile-email" id="profileEmail"></div>
      <div class="profile-badge">
        <i class="fas fa-feather-alt"></i>
        <span data-i18n="badge"></span>
      </div>
    </div>

    <div class="profile-tabs" role="tablist">
      <button class="tab-btn active" data-tab="settings" role="tab">
        <i class="fas fa-sliders-h"></i> <span data-i18n="tab_settings"></span>
      </button>
      <button class="tab-btn" data-tab="notes" role="tab">
        <i class="fas fa-feather"></i> <span data-i18n="tab_notes"></span>
      </button>
    </div>

    <div class="tab-panel" id="settings" role="tabpanel">

      <div class="panel-title">
        <i class="fas fa-user-cog"></i> <span data-i18n="settings_title"></span>
      </div>

      <div class="form-block">
        <div class="block-label" data-i18n="nickname_label"></div>
        <div class="field-group">
          <label for="nicknameInput" data-i18n="nickname_field_label"></label>
          <input type="text" id="nicknameInput" data-i18n-placeholder="nickname_placeholder">
        </div>
        <button class="btn-primary-custom" id="updateNicknameButton">
          <i class="fas fa-check"></i> <span data-i18n="nickname_btn"></span>
        </button>
        <div class="msg" id="nicknameMessage"></div>
      </div>

      <div class="form-block">
        <div class="block-label" data-i18n="password_label"></div>

        <div class="field-group">
          <label for="oldPassword" data-i18n="old_password_label"></label>
          <input type="password" id="oldPassword" placeholder="••••••••">
        </div>
        <div class="field-group">
          <label for="newPassword" data-i18n="new_password_label"></label>
          <input type="password" id="newPassword" placeholder="••••••••">
        </div>
        <div class="field-group">
          <label for="confirmPassword" data-i18n="confirm_password_label"></label>
          <input type="password" id="confirmPassword" placeholder="••••••••">
        </div>

        <button class="btn-primary-custom" id="changePasswordButton">
          <i class="fas fa-lock"></i> <span data-i18n="password_btn"></span>
        </button>
        <div class="msg" id="passwordMessage"></div>
      </div>

    </div>

    <div class="tab-panel hidden" id="notes" role="tabpanel">

      <div class="panel-title">
        <i class="fas fa-book-open"></i> <span data-i18n="notes_title"></span>
      </div>

      <div class="form-block">
        <div class="block-label" data-i18n="new_note_label"></div>
        <div class="field-group">
          <label for="noteInput" data-i18n="note_field_label"></label>
          <textarea id="noteInput" data-i18n-placeholder="note_placeholder"></textarea>
        </div>
        <button class="btn-primary-custom" id="saveNoteButton">
          <i class="fas fa-save"></i> <span data-i18n="note_btn"></span>
        </button>
        <div class="msg" id="noteMessage"></div>
      </div>

      <div class="notes-list" id="notesList"></div>

    </div>

    <div class="logout-row">
      <button class="btn-logout" id="logoutButton">
        <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout_btn"></span>
      </button>
    </div>
  </div>
</body>
<script src="../js/user.js"></script>
</html>
